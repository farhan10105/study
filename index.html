
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sirajia Milk Shop</title>
    <style>
        body {
            font-family: Arial;
            background: #f5e6d3;
            padding: 20px;
        }
        .box {
            max-width: 500px;
            margin: auto;
            background: white;
            border-radius: 20px;
            padding: 20px;
        }
        h1 {
            color: #2c5a2e;
            text-align: center;
        }
        input, button {
            padding: 10px;
            margin: 5px;
            border-radius: 10px;
        }
        input {
            width: 90%;
            border: 1px solid #ffcf8a;
        }
        button {
            background: #f3b33d;
            border: none;
            cursor: pointer;
        }
        .item {
            background: #fef3e2;
            padding: 10px;
            margin: 10px 0;
            border-radius: 10px;
        }
        .total {
            background: #2c5a2e;
            color: white;
            padding: 15px;
            text-align: center;
            border-radius: 10px;
            margin-top: 15px;
        }
        .bill {
            background: black;
            color: lime;
            padding: 10px;
            font-family: monospace;
            font-size: 12px;
            margin-top: 15px;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<div class="box">
    <h1>🥛 SIRAJIA MILK SHOP 🥛</h1>
    
    <label>Customer Name:</label>
    <input type="text" id="customer" placeholder="Enter name" value="Rashidul Hasan">
    
    <div id="items"></div>
    
    <button onclick="addItem()">➕ Add Item</button>
    
    <div class="total">
        TOTAL: ₹ <span id="grandTotal">0</span>
    </div>
    
    <button onclick="downloadBill()">💾 Download Bill</button>
    
    <div class="bill" id="billPreview">
        Bill will appear here...
    </div>
</div>

<script>
    let items = [
        { name: "🥛 Milk", price: 60, qty: 2.5 },
        { name: "🍶 Yoghurt", price: 45, qty: 1 },
        { name: "🥚 Eggs", price: 8, qty: 12 }
    ];
    let nextId = 4;

    function showItems() {
        let html = '';
        let total = 0;
        
        for(let i = 0; i < items.length; i++) {
            let item = items[i];
            let itemTotal = item.qty * item.price;
            total = total + itemTotal;
            
            html = html + '<div class="item">';
            html = html + '<b>' + item.name + '</b><br>';
            html = html + 'Qty: <input type="number" id="qty_' + i + '" value="' + item.qty + '" step="0.5" style="width:80px" onchange="updateQty(' + i + ', this.value)"> ';
            html = html + '₹' + item.price + ' = ₹' + itemTotal.toFixed(2);
            html = html + ' <button onclick="removeItem(' + i + ')">❌</button>';
            html = html + '</div>';
        }
        
        document.getElementById('items').innerHTML = html;
        document.getElementById('grandTotal').innerHTML = total.toFixed(2);
        makeBill();
    }
    
    function updateQty(index, val) {
        items[index].qty = parseFloat(val);
        if(isNaN(items[index].qty)) items[index].qty = 0;
        showItems();
    }
    
    function removeItem(index) {
        if(items.length <= 1) {
            alert("At least one item needed!");
            return;
        }
        items.splice(index, 1);
        showItems();
    }
    
    function addItem() {
        let name = prompt("Item name:", "Butter");
        if(!name) name = "New Item";
        let price = parseFloat(prompt("Price per unit:", "50"));
        if(isNaN(price)) price = 50;
        let qty = parseFloat(prompt("Quantity:", "1"));
        if(isNaN(qty)) qty = 1;
        
        items.push({ name: name, price: price, qty: qty });
        showItems();
    }
    
    function makeBill() {
        let customer = document.getElementById('customer').value;
        let date = new Date().toLocaleString();
        let total = 0;
        let text = '';
        
        for(let i = 0; i < items.length; i++) {
            let item = items[i];
            let itemTotal = item.qty * item.price;
            total = total + itemTotal;
            text = text + item.name + " | " + item.qty + " × ₹" + item.price + " = ₹" + itemTotal.toFixed(2) + "\n";
        }
        
        let bill = "╔════════════════════════════════╗\n";
        bill = bill + "║    SIRAJIA MILK SHOP         ║\n";
        bill = bill + "╚════════════════════════════════╝\n";
        bill = bill + "Customer: " + customer + "\n";
        bill = bill + "Date: " + date + "\n";
        bill = bill + "--------------------------------\n";
        bill = bill + text;
        bill = bill + "--------------------------------\n";
        bill = bill + "TOTAL: ₹" + total.toFixed(2) + "\n";
        bill = bill + "Thank you! Visit Again\n";
        
        document.getElementById('billPreview').innerHTML = '<pre>' + bill + '</pre>';
    }
    
    function downloadBill() {
        let customer = document.getElementById('customer').value;
        let date = new Date().toISOString().slice(0, 19);
        let total = 0;
        let text = '';
        
        for(let i = 0; i < items.length; i++) {
            let item = items[i];
            let itemTotal = item.qty * item.price;
            total = total + itemTotal;
            text = text + item.name + " | " + item.qty + " × ₹" + item.price + " = ₹" + itemTotal.toFixed(2) + "\n";
        }
        
        let bill = "SIRAJIA MILK SHOP\n";
        bill = bill + "Customer: " + customer + "\n";
        bill = bill + "Date: " + new Date().toLocaleString() + "\n";
        bill = bill + "----------------------------\n";
        bill = bill + text;
        bill = bill + "----------------------------\n";
        bill = bill + "TOTAL: ₹" + total.toFixed(2) + "\n";
        bill = bill + "Thank you!\n";
        
        let blob = new Blob([bill], {type: "text/plain"});
        let url = URL.createObjectURL(blob);
        let a = document.createElement('a');
        a.href = url;
        a.download = "Sirajia_Bill_" + customer + "_" + date + ".txt";
        a.click();
        URL.revokeObjectURL(url);
        alert("Bill Downloaded!");
    }
    
    document.getElementById('customer').addEventListener('input', makeBill);
    showItems();
</script>

</body>
</html>
